name: Build Chromium Kiosk

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  test:
    name: Run bats tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y bats jq
      - name: Run tests
        run: bats tests/launch-kiosk.bats

  wait-for-pwa:
    name: Wait for PWA package on npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for @xiboplayer/pwa on npm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LATEST=$(npm view "@xiboplayer/pwa" version 2>/dev/null || echo "0.0.0")
          if [ "$LATEST" = "$VERSION" ]; then
            echo "Already on npm"
            exit 0
          fi
          echo "Waiting for @xiboplayer/pwa@${VERSION} (current: ${LATEST})..."
          for i in $(seq 1 60); do
            if npm view "@xiboplayer/pwa@${VERSION}" version 2>/dev/null; then
              echo "Found on npm after ~$((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "::error::@xiboplayer/pwa@${VERSION} not published after 10 min"
          exit 1

  rpm:
    needs: [test, wait-for-pwa]
    if: always() && needs.test.result == 'success' && (needs.wait-for-pwa.result == 'success' || needs.wait-for-pwa.result == 'skipped')
    uses: xibo-players/.github/.github/workflows/build-rpm.yml@main
    with:
      package-name: xiboplayer-chromium
      rpm-spec: 'xiboplayer-chromium.spec'
      rpm-script: 'build-rpm.sh'
      fedora-matrix: '["43"]'
      arch-matrix: '["x86_64", "aarch64"]'
      gpg-sign: true
      publish-to-repo: true
      default-version: '0.7.13'
    secrets: inherit

  deb:
    needs: [test, wait-for-pwa]
    if: always() && needs.test.result == 'success' && (needs.wait-for-pwa.result == 'success' || needs.wait-for-pwa.result == 'skipped')
    uses: xibo-players/.github/.github/workflows/build-deb.yml@main
    with:
      package-name: xiboplayer-chromium
      deb-script: 'build-deb.sh'
      distro-matrix: '["ubuntu:24.04", "debian:trixie"]'
      arch-matrix: '["amd64", "arm64"]'
      gpg-sign: true
      publish-to-repo: true
      default-version: '0.7.13'
      extra-build-deps: 'nodejs npm'
    secrets: inherit

  release:
    needs: [rpm, deb]
    uses: xibo-players/.github/.github/workflows/create-release.yml@main
    with:
      package-name: xiboplayer-chromium
      description: 'Chromium kiosk-mode Xibo digital signage player.'

